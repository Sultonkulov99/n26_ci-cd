version: '3.9'

services:
  db-docker:
    image: postgres:15
    container_name: 26_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: docker-compose-db
    ports:
      - '5444:5432'
    volumes:
      - baza_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: 26_redis
    restart: always
    ports:
      - '6379:6379'
  app:
    build: .
    container_name: 26_app
    restart: always
    env_file:
      - .env
    ports:
      - '4000:3000'
    depends_on:
      - db-docker
      - redis
    command: >
      sh -c "
        npx prisma generate &&
        npx prisma migrate deploy &&
        npm run start:prod
      "
    environment:
      DATABASE_URL: postgres://postgres:12345@db-docker:5432/docker-compose-db
      REDIS_HOST: redis
      REDIS_PORT: 6379

volumes:
  baza_data:
